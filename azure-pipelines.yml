trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.11'

- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  displayName: 'Install Dependencies'

- script: |
    echo "Build Successful"
  displayName: 'Build Application'

- script: |
    az login --service-principal \
      -u "$(AZURE_CLIENT_ID)" \
      -p "$(AZURE_CLIENT_SECRET)" \
      --tenant "$(AZURE_TENANT_ID)"

    az account set --subscription "$(AZURE_SUBSCRIPTION_ID)"

    for vm in MyEcomm-VMSS_743accb4 MyEcomm-VMSS_4452740d
    do
      echo "Deploying to $vm"

      az vm run-command invoke \
        --resource-group RG-User11 \
        --name $vm \
        --command-id RunShellScript \
        --scripts "
          sudo mkdir -p /opt/myecomm
          sudo tee /opt/myecomm/app.py > /dev/null
          sudo pkill -f app.py || true
          nohup python3 /opt/myecomm/app.py > /opt/myecomm/app.log 2>&1 &
          sudo systemctl restart nginx
        " < app.py
    done
  displayName: 'Deploy to VMSS'